<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第二阶段 - 亚洲四边形</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: #05080c;
            color: #e7eef2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .terminal {
            background: #0c1219;
            border: 1px solid #1c2b35;
            border-top: 3px solid #00ffcc;
            padding: 40px;
            border-radius: 4px;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), 0 0 20px rgba(0, 255, 204, 0.1);
        }

        .eyebrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #ffb200;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        h1 span { color: #00ffcc; }

        p {
            font-size: 1rem;
            color: #a0b0ba;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .data-box {
            background: rgba(0, 255, 204, 0.05);
            border: 1px solid #1c2b35;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #c6d2d8;
            margin-bottom: 30px;
        }

        .data-box ul { list-style: none; margin-top: 15px; }
        .data-box li { 
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px; 
            border-bottom: 1px dashed #24333d; 
            padding-bottom: 8px; 
        }
        .data-box li:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .cidade-nome { font-weight: bold; color: #ffffff; }
        .coord-text { color: #00ffcc; }

        .input-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-field {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .input-field label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #ffb200;
            margin-bottom: 5px;
        }

        .input-field input {
            background: #060a0f;
            border: 1px solid #24333d;
            color: #00ffcc;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            padding: 15px;
            border-radius: 2px;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        #msg-status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            text-align: center;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 48px;
        }

        .erro { color: #ff4d4d; border: 1px solid #ff4d4d; background: rgba(255, 77, 77, 0.1); }
        .sucesso { color: #00ffcc; border: 1px solid #00ffcc; background: rgba(0, 255, 204, 0.1); }

        .btn-action {
            width: 100%;
            background: transparent;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 18px;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>

    <div class="terminal">
        <div class="eyebrow">模拟等级 2</div>
        <h1>亚洲 <span>四边形</span></h1>
        
        <p>董事会已批准扩张。新的挑战是定位中国大陆的中央枢纽。我们有四个需求完全相同的超级节点，形成了一个物流四边形。</p>
        <p><b>任务：</b> 计算 <b>4 个点</b>的几何中心（四个顶点的算术平均值）并输入精确坐标。</p>

        <div class="data-box">
            > GPS 采集数据 (需求相等):
            <ul>
                <li><span class="cidade-nome">北京</span> <span class="coord-text">纬度: 39.90 | 经度: 116.40</span></li>
                <li><span class="cidade-nome">上海</span> <span class="coord-text">纬度: 31.23 | 经度: 121.47</span></li>
                <li><span class="cidade-nome">广州</span> <span class="coord-text">纬度: 23.12 | 经度: 113.26</span></li>
                <li><span class="cidade-nome">重庆</span> <span class="coord-text">纬度: 29.56 | 经度: 106.55</span></li>
            </ul>
        </div>

        <div class="input-group">
            <div class="input-field">
                <label>> 输入纬度 (y)</label>
                <input type="number" id="input-lat" step="0.01" placeholder="例如: 30.00">
            </div>
            <div class="input-field">
                <label>> 输入经度 (x)</label>
                <input type="number" id="input-lon" step="0.01" placeholder="例如: 115.00">
            </div>
        </div>

        <div id="msg-status">等待数据输入...</div>

        <button class="btn-action" onclick="validarCoordenadas()">处理坐标</button>
    </div>

    <script>
        function validarCoordenadas() {
            // 中心点坐标 (约等于武汉)
            const targetLat = 30.95;
            const targetLon = 114.42;
            const tolerancia = 0.05;

            let lat = parseFloat(document.getElementById('input-lat').value);
            let lon = parseFloat(document.getElementById('input-lon').value);
            let msg = document.getElementById('msg-status');

            if (isNaN(lat) || isNaN(lon)) {
                msg.className = 'erro';
                msg.innerHTML = "[错误] 请在两个字段中输入数值。";
                return;
            }

            let difLat = Math.abs(lat - targetLat);
            let difLon = Math.abs(lon - targetLon);

            if (difLat <= tolerancia && difLon <= tolerancia) {
                msg.className = 'sucesso';
                msg.innerHTML = "[成功] 亚洲几何中心验证通过。正在重定向到空间可视化...";
                
                setTimeout(function() {
                    window.location.href = '02_resultado2cn.html';
                }, 2000);
            } else {
                msg.className = 'erro';
                msg.innerHTML = "[严重错误] 检测到航线偏差。请记住：现在除以 4。请重新计算。";
            }
        }
    </script>
</body>
</html>
