<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>阶段 3 - 逻辑流</title>
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background: #060a0f; color: #fff; padding: 50px; display: flex; justify-content: center; }
        .card { max-width: 600px; background: #0c1219; padding: 40px; border: 1px solid #00ffcc; text-align: center; }
        h1 { color: #00ffcc; }
        p { color: #a0b0ba; line-height: 1.6; margin-top: 20px; }
        input { width: 100%; padding: 12px; margin: 20px 0; background: #060a0f; border: 1px solid #444; color: #00ffcc; text-align: center; font-size: 1.1rem; }
        button { width: 100%; padding: 15px; background: #00ffcc; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="card">
        <h1>阶段 3：逻辑流分析</h1>
        <p>输入该物流网络中最关键的变量参数：</p>
        <input type="text" id="resposta" placeholder="输入变量">
        <button onclick="validar()">验证决策</button>
        <p id="feedback" style="margin-top:15px; font-weight:bold;"></p>
    </div>

    <script>
        function validar() {
            // Ajuste a lógica conforme necessário
            if(document.getElementById('resposta').value.toUpperCase() === 'LOG') {
                window.location.href = "03_resultado3cn.html";
            } else {
                document.getElementById('feedback').innerText = "错误，请重试。";
                document.getElementById('feedback').style.color = "#ff4d4d";
            }
        }
    </script>
</body>
</html>
