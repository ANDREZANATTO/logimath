<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一阶段 - 三角运算 (计算)</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: #05080c;
            color: #e7eef2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .terminal {
            background: #0c1219;
            border: 1px solid #1c2b35;
            border-top: 3px solid #00ffcc;
            padding: 40px;
            border-radius: 4px;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), 0 0 20px rgba(0, 255, 204, 0.1);
        }

        .eyebrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #ffb200;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        h1 span { color: #00ffcc; }

        p {
            font-size: 1rem;
            color: #a0b0ba;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .data-box {
            background: rgba(0, 255, 204, 0.05);
            border: 1px solid #1c2b35;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #c6d2d8;
            margin-bottom: 30px;
        }

        .data-box ul { list-style: none; margin-top: 15px; }
        .data-box li { 
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px; 
            border-bottom: 1px dashed #24333d; 
            padding-bottom: 8px; 
        }
        .data-box li:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .cidade-nome { font-weight: bold; color: #ffffff; }
        .coord-text { color: #00ffcc; }

        .input-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-field {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .input-field label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #ffb200;
            margin-bottom: 5px;
        }

        .input-field input {
            background: #060a0f;
            border: 1px solid #24333d;
            color: #00ffcc;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            padding: 15px;
            border-radius: 2px;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        #msg-status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            text-align: center;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 48px;
        }

        .erro { color: #ff4d4d; border: 1px solid #ff4d4d; background: rgba(255, 77, 77, 0.1); }
        .sucesso { color: #00ffcc; border: 1px solid #00ffcc; background: rgba(0, 255, 204, 0.1); }

        .btn-action {
            width: 100%;
            background: transparent;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 18px;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>

    <div class="terminal">
        <div class="eyebrow">模拟等级 1</div>
        <h1>三角 <span>行动</span></h1>
        
        <p>董事会需要在圣保罗州建设一个主配送中心，以服务三个最大的消费中心。它们之间的需求是严格相等的。</p>
        <p><b>任务：</b> 使用算术平均坐标计算 <b>重心</b>（几何平衡点）。输入结果以校准系统。</p>

        <div class="data-box">
            > GPS 采集数据:
            <ul>
                <li><span class="cidade-nome">圣保罗 (SÃO PAULO)</span> <span class="coord-text">纬度: -23.55 | 经度: -46.63</span></li>
                <li><span class="cidade-nome">伊图 (ITU)</span> <span class="coord-text">纬度: -23.26 | 经度: -47.29</span></li>
                <li><span class="cidade-nome">安帕鲁 (AMPARO)</span> <span class="coord-text">纬度: -22.70 | 经度: -46.76</span></li>
            </ul>
        </div>

        <div class="input-group">
            <div class="input-field">
                <label>> 输入纬度 (y)</label>
                <input type="number" id="input-lat" step="0.01" placeholder="例如: -23.00">
            </div>
            <div class="input-field">
                <label>> 输入经度 (x)</label>
                <input type="number" id="input-lon" step="0.01" placeholder="例如: -46.00">
            </div>
        </div>

        <div id="msg-status">等待数据输入...</div>

        <button class="btn-action" onclick="validarCoordenadas()">处理坐标</button>
    </div>

    <script>
        function validarCoordenadas() {
            const targetLat = -23.17;
            const targetLon = -46.89;
            const tolerancia = 0.05; 

            let lat = parseFloat(document.getElementById('input-lat').value);
            let lon = parseFloat(document.getElementById('input-lon').value);
            let msg = document.getElementById('msg-status');

            if (isNaN(lat) || isNaN(lon)) {
                msg.className = 'erro';
                msg.innerHTML = "[错误] 请在两个字段中输入数值。";
                return;
            }

            let difLat = Math.abs(lat - targetLat);
            let difLon = Math.abs(lon - targetLon);

            if (difLat <= tolerancia && difLon <= tolerancia) {
                msg.className = 'sucesso';
                msg.innerHTML = "[成功] 坐标验证通过。校准完成！正在重定向到地图...";
                
                setTimeout(function() {
                    window.location.href = '01_resultado1cn.html';
                }, 2000);
            } else {
                msg.className = 'erro';
                msg.innerHTML = "[严重错误] 坐标不正确。该点偏离了理想区域。请重新计算算术平均值。";
            }
        }
    </script>
</body>
</html>
